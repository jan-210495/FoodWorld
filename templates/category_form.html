{% extends "base.html" %}

{% block title %}{% if category %}Edit{% else %}Add{% endif %} Category - FoodWorld{% endblock %}

{% block content %}
<section class="container add-recipe">
  <h2>{% if category %}Edit{% else %}Add{% endif %} Category</h2>
  <form method="POST" class="recipe-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" maxlength="50" required value="{{ form_data.get('name', category.name if category else '') }}">
    </div>
    <div class="form-group">
      <label for="photo">Photo URL</label>
      <input type="url" name="photo" id="photo" value="{{ form_data.get('photo', category.photo if category else '') }}" placeholder="https://example.com/category.jpg">
    </div>
    <button type="submit" class="btn">{% if category %}Update{% else %}Add{% endif %} Category</button>
  </form>
  <a href="{{ url_for('recipe_bp.manage_categories') }}" class="btn btn-outline" style="margin-top: 2rem;">← Back to Categories</a>
</section>
{% endblock %}
