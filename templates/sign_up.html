{% extends "base.html" %}

{% block title %}Register - FoodWorld{% endblock %}

{% block content %}
<section class="auth-page" style="background-image: url('{{ url_for('static', filename='img/login_img.jpg') }}');">
  <div class="auth-signup-container">
    <form action="{{ url_for('user_bp.register') }}" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h1>Sign Up</h1>
      <div class="input-box">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" value="{{ form_data.get('username', '') }}" maxlength="50" autocomplete="username" required>
        <i class="bx bxs-user" aria-hidden="true"></i>
      </div>
      <div class="input-box">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ form_data.get('email', '') }}" maxlength="120" autocomplete="email" required>
        <i class="bx bxs-envelope" aria-hidden="true"></i>
      </div>
      <div class="input-box">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" minlength="8" autocomplete="new-password" required>
        <i class="bx bxs-lock-alt" aria-hidden="true"></i>
      </div>
      <button type="submit" class="signup-btn">Register</button>
      <div class="register-link"><p>Already have an account? <a href="{{ url_for('user_bp.login_page') }}">Login</a></p></div>
    </form>
  </div>
</section>
{% endblock %}
