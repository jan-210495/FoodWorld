{% extends "base.html" %}

{% block title %}Login - FoodWorld{% endblock %}

{% block content %}
<section class="auth-page" style="background-image: url('{{ url_for('static', filename='img/login_img.jpg') }}');">
  <div class="auth-container">
    <form action="{{ url_for('user_bp.login') }}" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <h1>Sign In</h1>
      <div class="input-box">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ form_data.get('email', '') }}" autocomplete="email" required>
        <i class="bx bxs-user" aria-hidden="true"></i>
      </div>
      <div class="input-box">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" autocomplete="current-password" required>
        <i class="bx bxs-lock-alt" aria-hidden="true"></i>
      </div>
      <div class="remember-forgot">
        <label><input type="checkbox" name="remember"> Remember me</label>
      </div>
      <button type="submit" class="btn">Login</button>
      <div class="register-link"><p>Don't have an account? <a href="{{ url_for('user_bp.register_page') }}">Register</a></p></div>
    </form>
  </div>
</section>
{% endblock %}
